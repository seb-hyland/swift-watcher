<!doctype html>
<html>
    <head>
        <style>
            @font-face {
                font-family: "Monaspace Xenon";
                font-style: normal;
                font-display: swap;
                font-weight: 400;
                src:
                    url(https://cdn.jsdelivr.net/fontsource/fonts/monaspace-xenon@latest/latin-400-normal.woff2)
                        format("woff2"),
                    url(https://cdn.jsdelivr.net/fontsource/fonts/monaspace-xenon@latest/latin-400-normal.woff)
                        format("woff");
            }

            :root {
                --bg: #f4f4f3;
                --fg: #2b2b2b;
                --muted: #6e6e6e;
                --card: #eaeaea;
                --border: #d4d4d2;
                --running: #9a6a12;
                --success: #4d7c2f;
                --failure: #b23636;
            }

            html,
            body {
                margin: 0;
                padding: 0;
                height: 100vh;
                width: 100vw;
                overflow: hidden;
                box-sizing: border-box;
            }

            body {
                display: flex;
                flex-direction: column;
                font-family: "Monaspace Xenon", serif;
                background: var(--bg);
                color: var(--fg);
                padding: 20px;
            }

            h1 {
                margin: 0 0 4px;
            }

            .subtitle {
                margin: 0 0 16px;
                color: var(--muted);
                font-size: 0.9rem;
            }

            #log-container {
                flex-grow: 1;
                overflow-y: auto;
                overflow-x: hidden;
                margin-bottom: 15px;
                display: flex;
                flex-direction: column;
                gap: 8px;
            }

            .stage {
                border: 1px solid var(--border);
                border-radius: 6px;
                background: var(--card);
                overflow: hidden;
            }

            .stage > summary {
                display: flex;
                align-items: center;
                gap: 10px;
                padding: 10px 14px;
                cursor: pointer;
                list-style: none;
                user-select: none;
                font-size: 1.05rem;
            }
            .stage > summary::-webkit-details-marker {
                display: none;
            }

            .status {
                display: inline-flex;
                align-items: center;
                justify-content: center;
                width: 1.3em;
                height: 1.3em;
                flex: none;
                font-weight: bold;
            }
            /* pending: hollow dot; running: spinner; done: check / cross */
            .stage .status::before {
                content: "○";
                color: var(--muted);
            }
            .stage.running .status::before {
                content: "";
                width: 0.9em;
                height: 0.9em;
                border: 2px solid var(--border);
                border-top-color: var(--running);
                border-radius: 50%;
                animation: spin 0.8s linear infinite;
            }
            .stage.success .status::before {
                content: "✓";
                color: var(--success);
            }
            .stage.failure .status::before {
                content: "✕";
                color: var(--failure);
            }
            .stage.running > summary {
                color: var(--running);
            }
            .stage.failure > summary {
                color: var(--failure);
            }

            @keyframes spin {
                to {
                    transform: rotate(360deg);
                }
            }

            pre {
                font-family: "Monaspace Xenon", monospace;
                font-size: 0.9rem;
                margin: 0;
                padding: 0 14px 12px 40px;
                white-space: pre-wrap;
                word-break: break-word;
            }
            .log-messages:empty,
            .log-error:empty {
                display: none;
            }
            .log-error {
                color: var(--failure);
            }

            #load-build-button {
                font-family: inherit;
                font-size: 1rem;
                padding: 10px 16px;
                border: 1px solid var(--border);
                border-radius: 6px;
                background: var(--card);
                color: var(--fg);
                cursor: pointer;
            }
            #load-build-button[disabled] {
                cursor: default;
                color: var(--muted);
            }

            /* ANSI colors emitted by ansi_up */
            .ansi-black { color: #2b2b2b; }
            .ansi-red { color: #cc241d; }
            .ansi-green { color: #98971a; }
            .ansi-yellow { color: #d79921; }
            .ansi-blue { color: #458588; }
            .ansi-magenta { color: #b16286; }
            .ansi-cyan { color: #689d6a; }
            .ansi-white { color: #6e6e6e; }
            .ansi-bright-black { color: #928374; }
        </style>
    </head>
    <body>
        <h1>Build Dashboard</h1>
        <p class="subtitle">Id: ___ID___</p>
        <div id="log-container">___LOG_DIVS___</div>
        <button id="load-build-button" disabled>Build in progress…</button>
        <script>
            // prettier-ignore
            ___BUNDLE_JS___
        </script>
    </body>
</html>
